version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: guised_up_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: guised_up
      POSTGRES_USER: guised_admin
      POSTGRES_PASSWORD: guised_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guised_admin -d guised_up"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: guised_up_app
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: guised_up_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: guised_up
      POSTGRES_USER: guised_admin
      POSTGRES_PASSWORD: guised_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guised_admin -d guised_up"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: guised_up_app
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    tty: true
    stdin_open: true
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: guised_up
      DB_USERNAME: guised_admin
      DB_PASSWORD: guised_password
      EMBEDDING_SERVICE_URL: http://embedding:8001
    depends_on:
      db:
        condition: service_healthy

  embedding:
    build:
      context: ./embedding-service
      dockerfile: Dockerfile
    container_name: guised_up_embedding
    ports:
      - "8001:8001"
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
